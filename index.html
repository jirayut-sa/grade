<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7A1F1F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="คะแนนบ้านโคกประดู่">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<title>ระบบบันทึกคะแนนนักเรียน - โรงเรียนบ้านโคกประดู่</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --maroon-900:#5C1414; --maroon-800:#7A1F1F; --maroon-600:#9C2B2B; --maroon-500:#B5382F; --maroon-100:#F3DCDC;
  --gold-600:#C98A2B; --gold-500:#E8A33D; --gold-200:#F6D9A6; --gold-100:#FBE8C8;
  --green-700:#1F5C42; --green-600:#2E6B4F; --green-100:#DCEEE3;
  --amber-600:#C1622B; --amber-100:#F7E1D0;
  --blue-600:#2A5C9C; --blue-100:#DCE6F3;
  --cream-50:#FBF6EC; --cream-100:#F5EEDF;
  --ink-900:#2B2320; --ink-700:#463A33; --ink-500:#6B5F55; --ink-300:#A99C8F;
  --line:#E7DCC8;
  --glass-bg:rgba(255,255,255,.55); --glass-bg-strong:rgba(255,255,255,.72); --glass-border:rgba(255,255,255,.6);
  --shadow-sm:0 1px 2px rgba(43,35,32,.06),0 1px 3px rgba(43,35,32,.08);
  --shadow-md:0 4px 10px rgba(43,35,32,.08),0 2px 4px rgba(43,35,32,.06);
  --shadow-lg:0 12px 28px rgba(43,35,32,.16),0 4px 10px rgba(43,35,32,.08);
  --shadow-glass:0 8px 32px rgba(92,20,20,.18);
  --radius-sm:10px; --radius-md:16px; --radius-lg:22px; --radius-full:999px;
  --font-display:'Kanit',sans-serif; --font-body:'Sarabun',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--font-body);background:var(--cream-50);color:var(--ink-900);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:calc(160px + env(safe-area-inset-bottom));}
body.no-scroll-pad{padding-bottom:0;}
button,input,select,textarea{font:inherit;color:inherit;}
button{cursor:pointer;background:none;border:none;text-align:inherit;}
img{display:block;max-width:100%;}
:focus-visible{outline:2.5px solid var(--gold-500);outline-offset:2px;}
h1,h2,h3{font-family:var(--font-display);}

/* ---------- Animated gradient backdrop (used behind login + AI) ---------- */
.aurora-bg{position:fixed;inset:0;z-index:-1;background:
  radial-gradient(circle at 15% 20%, rgba(156,43,43,.55), transparent 45%),
  radial-gradient(circle at 85% 15%, rgba(232,163,61,.45), transparent 45%),
  radial-gradient(circle at 50% 90%, rgba(46,107,79,.35), transparent 50%),
  linear-gradient(160deg,#3a0d0d 0%,#5C1414 45%,#7A1F1F 100%);
  background-size:180% 180%; animation:auroraShift 16s ease-in-out infinite;}
@keyframes auroraShift{0%{background-position:0% 30%;}50%{background-position:100% 70%;}100%{background-position:0% 30%;}}

/* ---------- Glass card base ---------- */
.glass{background:var(--glass-bg);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border:1px solid var(--glass-border);box-shadow:var(--shadow-glass);}
.glass-strong{background:var(--glass-bg-strong);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);}

/* ---------- Login screen ---------- */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;}
.login-card{width:100%;max-width:400px;border-radius:26px;padding:34px 28px 30px;position:relative;overflow:hidden;transform-style:preserve-3d;animation:cardRise .6s cubic-bezier(.22,1,.36,1);}
@keyframes cardRise{from{opacity:0;transform:translateY(24px) rotateX(6deg);}to{opacity:1;transform:translateY(0) rotateX(0);}}
.login-logo{width:76px;height:76px;border-radius:50%;background:#fff;padding:4px;margin:0 auto 14px;box-shadow:0 10px 24px rgba(0,0,0,.25);}
.login-logo img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.login-title{font-family:var(--font-display);font-weight:700;font-size:20px;color:#fff;text-align:center;line-height:1.4;text-shadow:0 2px 8px rgba(0,0,0,.25);}
.login-sub{font-size:12.5px;color:var(--gold-200);text-align:center;margin-top:2px;font-weight:600;}
.login-field{margin-top:18px;}
.login-field label{display:block;font-size:12.5px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:6px;}
.login-field input{width:100%;border:1px solid rgba(255,255,255,.35);border-radius:var(--radius-sm);padding:13px 14px;font-size:16px;background:rgba(255,255,255,.14);color:#fff;}
.login-field input::placeholder{color:rgba(255,255,255,.5);}
.login-field input:focus{outline:none;border-color:var(--gold-400,var(--gold-500));background:rgba(255,255,255,.22);}
.login-role-hint{font-size:11.5px;color:rgba(255,255,255,.65);text-align:center;margin-top:16px;line-height:1.7;}
.login-error{background:rgba(181,56,47,.35);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:13px;padding:10px 12px;border-radius:12px;margin-top:14px;text-align:center;}

/* ---------- Header ---------- */
.app-header{position:relative;isolation:isolate;background:linear-gradient(155deg,var(--maroon-900) 0%,var(--maroon-600) 55%,var(--maroon-500) 100%);padding:calc(18px + env(safe-area-inset-top)) 20px 22px;border-radius:0 0 28px 28px;overflow:hidden;}
.app-header__glow{position:absolute;top:-70px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(232,163,61,.38),transparent 70%);border-radius:50%;z-index:0;}
.app-header__row{display:flex;align-items:center;gap:14px;position:relative;z-index:2;}
.app-header__logo{width:56px;height:56px;border-radius:50%;background:#fff;padding:3px;box-shadow:var(--shadow-md);flex-shrink:0;}
.app-header__logo img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.app-header__title{font-family:var(--font-display);font-weight:700;font-size:19px;color:#fff;line-height:1.3;}
.app-header__subtitle{font-family:var(--font-body);font-size:13px;color:var(--gold-200);margin-top:1px;font-weight:600;}
.app-header__date{font-size:11.5px;color:rgba(255,255,255,.65);margin-top:12px;position:relative;z-index:2;}
.app-header__user{position:absolute;top:calc(14px + env(safe-area-inset-top));right:16px;z-index:3;display:flex;align-items:center;gap:8px;}
.app-header__role-badge{font-size:10.5px;font-weight:700;color:#fff;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);padding:5px 10px;border-radius:var(--radius-full);}
.app-header__logout{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;}
.app-header__logout svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.2;}

/* ---------- Screen title ---------- */
.screen-title{position:sticky;top:0;z-index:20;background:var(--cream-50);padding:16px 16px 10px;}
.screen-title__row{display:flex;align-items:center;gap:12px;}
.title-icon,.title-back{width:38px;height:38px;border-radius:12px;background:#fff;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;color:var(--maroon-600);flex-shrink:0;}
.title-back{cursor:pointer;}
.title-icon svg,.title-back svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.screen-title__text{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--ink-900);}
.screen-title__sub{font-size:12.5px;color:var(--ink-500);margin-top:1px;}

/* ---------- Main view ---------- */
.view{padding:4px 16px 80px;max-width:720px;margin:0 auto;}

/* ---------- Bottom nav ---------- */
.bottom-nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 16px rgba(43,35,32,.08);z-index:50;max-width:720px;margin:0 auto;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border-radius:14px;color:var(--ink-500);font-family:var(--font-body);font-size:11px;font-weight:700;transition:color .15s ease,transform .15s ease;}
.nav-btn svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;transition:transform .15s ease;}
.nav-btn.active{color:var(--maroon-600);}
.nav-btn.active svg{transform:translateY(-2px);}
.nav-btn:active{transform:scale(.92);}

/* ---------- Buttons ---------- */
.btn{font-family:var(--font-body);font-weight:700;font-size:14.5px;border-radius:var(--radius-full);padding:13px 20px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s ease,box-shadow .12s ease,opacity .12s ease;}
.btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round;}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.5;pointer-events:none;}
.btn-primary{background:linear-gradient(135deg,var(--maroon-600),var(--maroon-800));color:#fff;box-shadow:0 6px 16px rgba(122,31,31,.35);}
.btn-gold{background:linear-gradient(135deg,var(--gold-500),var(--gold-600));color:#fff;box-shadow:0 6px 16px rgba(201,138,43,.35);}
.btn-outline{background:#fff;color:var(--maroon-600);border:1.5px solid var(--maroon-600);}
.btn-block{width:100%;}
.btn-ghost{background:var(--cream-100);color:var(--ink-700);}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}

/* ---------- Segmented control ---------- */
.segmented{display:flex;background:var(--cream-100);border-radius:var(--radius-full);padding:4px;gap:4px;margin-bottom:16px;overflow-x:auto;}
.segmented button{flex:1;white-space:nowrap;padding:10px 12px;border-radius:var(--radius-full);font-family:var(--font-body);font-weight:700;font-size:12.5px;color:var(--ink-500);transition:all .15s ease;}
.segmented button.active{background:#fff;color:var(--maroon-600);box-shadow:var(--shadow-sm);}

/* ---------- Fields ---------- */
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:700;color:var(--ink-700);margin-bottom:6px;}
.field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;background:#fff;transition:border-color .15s ease,box-shadow .15s ease;}
.field input:focus,.field select:focus{outline:none;border-color:var(--maroon-500);box-shadow:0 0 0 3px rgba(156,43,43,.12);}
.field-hint{font-size:11.5px;color:var(--ink-500);margin-top:5px;}
.select-row{display:flex;gap:10px;margin-bottom:4px;}
.select-row .field{flex:1;margin-bottom:16px;}

/* ---------- 3D stat cards (dashboard overview) ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px;}
.stat-card{position:relative;border-radius:20px;padding:16px;color:#fff;overflow:hidden;box-shadow:0 10px 22px -6px rgba(43,35,32,.35),inset 0 1px 0 rgba(255,255,255,.25);transition:transform .2s ease;}
.stat-card:active{transform:scale(.97) translateY(1px);}
.stat-card--maroon{background:linear-gradient(140deg,var(--maroon-600),var(--maroon-900));}
.stat-card--gold{background:linear-gradient(140deg,var(--gold-500),var(--gold-600));}
.stat-card--green{background:linear-gradient(140deg,var(--green-600),var(--green-700));}
.stat-card--blue{background:linear-gradient(140deg,#3E77BF,var(--blue-600));}
.stat-card__icon{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-card__icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;}
.stat-card__value{font-family:var(--font-mono);font-weight:700;font-size:24px;line-height:1;}
.stat-card__label{font-size:11.5px;margin-top:6px;opacity:.9;font-weight:600;}

.chart-card{background:#fff;border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--line);margin-bottom:16px;}
.chart-card__title{font-family:var(--font-display);font-weight:700;font-size:14.5px;color:var(--ink-900);margin-bottom:10px;}
.chart-card canvas{max-width:100%;}

/* ---------- Cards / subject grid ---------- */
.subject-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:520px){.subject-grid{grid-template-columns:repeat(3,1fr);}}
.subject-card{background:#fff;border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--line);text-align:left;width:100%;transition:transform .15s ease;}
.subject-card:active{transform:scale(.97);}
.subject-card__accent{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.subject-card__accent svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.accent-maroon{background:var(--maroon-100);color:var(--maroon-600);}
.accent-gold{background:var(--gold-100);color:var(--gold-600);}
.accent-green{background:var(--green-100);color:var(--green-700);}
.subject-card__name{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ink-900);}
.subject-card__meta{font-size:11.5px;color:var(--ink-500);margin-top:5px;}

/* ---------- List rows ---------- */
.list-stack{display:flex;flex-direction:column;gap:10px;}
.list-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--radius-md);padding:12px 14px;box-shadow:var(--shadow-sm);border:1px solid var(--line);width:100%;text-align:left;transition:transform .12s ease;}
button.list-row:active{transform:scale(.985);}
.list-row__icon{width:38px;height:38px;border-radius:10px;background:var(--cream-100);display:flex;align-items:center;justify-content:center;color:var(--maroon-600);flex-shrink:0;}
.list-row__icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.list-row__body{flex:1;min-width:0;}
.list-row__title{font-weight:600;font-size:14.5px;color:var(--ink-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-row__meta{font-size:12.5px;color:var(--ink-500);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-row__chev svg{width:18px;height:18px;stroke:var(--ink-300);stroke-width:2.2;}
.icon-btn{width:36px;height:36px;border-radius:10px;background:var(--cream-100);display:flex;align-items:center;justify-content:center;color:var(--ink-500);flex-shrink:0;}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.icon-btn.danger{color:var(--maroon-600);background:var(--maroon-100);}

/* ---------- Student row (dashboard + record) ---------- */
.student-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--radius-md);padding:12px 14px;box-shadow:var(--shadow-sm);border:1px solid var(--line);width:100%;text-align:left;transition:transform .12s ease;}
button.student-row:active{transform:scale(.985);}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--maroon-600),var(--maroon-800));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:15px;flex-shrink:0;}
.avatar.sm{width:34px;height:34px;font-size:13px;}
.student-row__body{flex:1;min-width:0;}
.student-row__name{font-weight:600;font-size:14.5px;color:var(--ink-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.student-row__meta{font-size:12px;color:var(--ink-500);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.record-next{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--maroon-600);background:var(--maroon-100);padding:6px 11px;border-radius:var(--radius-full);flex-shrink:0;}

/* ---------- Grade badge / pill ---------- */
.grade-badge{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:16px;border:3px solid;flex-shrink:0;}
.grade-pill{display:inline-block;padding:4px 12px;border-radius:var(--radius-full);font-family:var(--font-mono);font-weight:700;font-size:12.5px;border:1.5px solid;}
.tier-good{background:var(--green-100);border-color:var(--green-600);color:var(--green-700);}
.tier-mid{background:var(--gold-100);border-color:var(--gold-600);color:var(--gold-600);}
.tier-low{background:var(--amber-100);border-color:var(--amber-600);color:var(--amber-600);}
.tier-poor{background:var(--maroon-100);border-color:var(--maroon-600);color:var(--maroon-600);}

/* ---------- Checkbox rows ---------- */
.checkbox-row{display:flex;align-items:center;gap:10px;cursor:pointer;}
.checkbox-row input[type="checkbox"]{width:21px;height:21px;accent-color:var(--maroon-600);flex-shrink:0;}
.enroll-toolbar{margin-bottom:10px;font-weight:700;font-size:13.5px;color:var(--ink-700);}

/* ---------- Empty states ---------- */
.empty-state{text-align:center;padding:52px 20px;color:var(--ink-500);}
.empty-state__icon svg{width:56px;height:56px;stroke:var(--ink-300);stroke-width:1.6;margin-bottom:14px;}
.empty-state__title{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--ink-700);}
.empty-state__sub{font-size:13px;margin-top:6px;line-height:1.6;}
.empty-row{text-align:center;color:var(--ink-500);font-size:13.5px;padding:26px;}
.config-warning{background:#fff;border:2px dashed var(--maroon-500);border-radius:var(--radius-md);padding:20px;margin-top:10px;}
.config-warning__title{font-family:var(--font-display);font-weight:700;color:var(--maroon-600);margin-bottom:8px;font-size:15.5px;}
.config-warning__body{font-size:13.5px;color:var(--ink-700);line-height:1.7;}

/* ---------- Modal ---------- */
.modal-backdrop{position:fixed;inset:0;background:rgba(43,35,32,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s ease;}
.modal-backdrop.open{opacity:1;pointer-events:auto;}
.modal{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;transform:translateY(24px);transition:transform .25s cubic-bezier(.22,1,.36,1);}
.modal-backdrop.open .modal{transform:translateY(0);}
@media(min-width:560px){.modal-backdrop{align-items:center;}.modal{border-radius:24px;}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.modal-title{font-family:var(--font-display);font-weight:700;font-size:17px;}
.modal-eyebrow{font-size:12px;color:var(--ink-500);font-weight:700;margin-top:16px;text-align:center;letter-spacing:.02em;}
.modal-round{font-family:var(--font-mono);font-size:46px;font-weight:700;color:var(--maroon-600);text-align:center;line-height:1.15;margin-bottom:8px;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;}
.score-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--radius-full);background:var(--cream-100);border:1px solid var(--line);font-size:12.5px;}
.score-chip__label{color:var(--ink-500);font-weight:700;}
.score-chip__value{font-family:var(--font-mono);font-weight:700;color:var(--ink-900);}
.chip-del{background:transparent;color:var(--ink-300);padding:1px;display:flex;}
.chip-del svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.4;}

/* ---------- Toast ---------- */
.toast-container{position:fixed;top:calc(env(safe-area-inset-top) + 14px);left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none;padding:0 16px;}
.toast{background:var(--ink-900);color:#fff;padding:12px 20px;border-radius:var(--radius-full);font-size:13.5px;font-weight:700;box-shadow:var(--shadow-lg);max-width:100%;text-align:center;transform:translateY(-16px);opacity:0;transition:transform .25s ease,opacity .25s ease;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.error{background:var(--maroon-500);}
.toast.success{background:var(--green-700);}

/* ---------- Loading ---------- */
.loading-overlay{position:fixed;inset:0;background:rgba(251,246,236,.88);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:300;}
.spinner{width:38px;height:38px;border:4px solid var(--gold-200);border-top-color:var(--maroon-600);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-weight:700;color:var(--ink-700);font-size:13.5px;}

/* ---------- Report table ---------- */
.report-table-wrap{overflow-x:auto;background:#fff;border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:1px solid var(--line);}
.report-print-header{display:flex;align-items:center;gap:14px;padding:18px;border-bottom:2px solid var(--maroon-600);background:#fff;}
.report-print-header img{width:52px;height:52px;border-radius:50%;flex-shrink:0;}
.report-print-title{font-family:var(--font-display);font-weight:700;font-size:16.5px;color:var(--maroon-800);}
.report-print-sub{font-size:11.5px;color:var(--ink-500);margin-top:2px;}
table.report-table{width:100%;border-collapse:collapse;font-size:13.5px;background:#fff;}
.report-table th,.report-table td{padding:11px 13px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--line);}
.report-table th{font-family:var(--font-display);font-weight:600;background:var(--cream-100);color:var(--ink-700);font-size:12px;}
.report-table td:first-child,.report-table th:first-child{text-align:left;position:sticky;left:0;background:#fff;}
.report-table th:first-child{background:var(--cream-100);}
.report-table td.num{font-family:var(--font-mono);}

/* ---------- AI panel ---------- */
.ai-hero{border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;color:#fff;background:linear-gradient(140deg,#3a0d0d,var(--maroon-800) 55%,var(--gold-600));box-shadow:0 12px 26px -8px rgba(43,35,32,.4);}
.ai-hero__title{font-family:var(--font-display);font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px;}
.ai-hero__title svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;}
.ai-hero__sub{font-size:12.5px;opacity:.9;margin-top:6px;line-height:1.6;}
.ai-result{background:#fff;border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow-sm);border:1px solid var(--line);margin-top:14px;}
.ai-result h4{font-family:var(--font-display);font-size:14px;color:var(--maroon-700,var(--maroon-600));margin-bottom:8px;}
.ai-result p{font-size:13.5px;color:var(--ink-700);line-height:1.75;margin-bottom:10px;white-space:pre-wrap;}
.ai-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--gold-600);background:var(--gold-100);padding:4px 10px;border-radius:var(--radius-full);margin-bottom:10px;}
.risk-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;}
.risk-row:last-child{border-bottom:none;}

/* ---------- Import ---------- */
.dropzone{border:2px dashed var(--maroon-500);border-radius:var(--radius-md);padding:26px 16px;text-align:center;color:var(--ink-500);font-size:13px;background:var(--maroon-100);cursor:pointer;}
.dropzone strong{color:var(--maroon-600);display:block;margin-bottom:4px;font-family:var(--font-display);}
.import-preview{max-height:220px;overflow-y:auto;margin-top:12px;border:1px solid var(--line);border-radius:var(--radius-sm);}
.import-preview div{padding:8px 12px;font-size:13px;border-bottom:1px solid var(--line);}
.import-preview div:last-child{border-bottom:none;}

@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important;}}

<script>
/* ============================================================
   ตั้งค่า: วางลิงก์ Google Apps Script Web App ของคุณตรงนี้
   ดูวิธีสร้างและติดตั้งใน README.md

const API_URL = "https://script.google.com/macros/s/AKfycbz_yl8v8X2Z2z_Rc16aqHi8zDgYzBtrOEyrJgfEo3iHSAnAzTJQ51124gD8z2V2f8-hlg/exec";

/* ---------- Icons ---------- */
const ICONS = {
  book: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h11v16H6a2 2 0 00-2 2z"/><path d="M17 3v16"/></svg>',

  key: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="15" r="4"/><path d="M10.8 12.2L20 3M17 6l3 3M14 9l2 2"/></svg>',

  close: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>',
  check: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
  chevRight: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  back: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>',
  warn: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9L2.8 17a1.8 1.8 0 001.5 2.7h15.4a1.8 1.8 0 001.5-2.7L13.7 3.9a1.8 1.8 0 00-3.4 0z"/></svg>',
  download: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg>',
  upload: '<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5M12 3v12"/></svg>',
};

/* ---------- Grade table ---------- */
const GRADE_TABLE = [
  {min:80, grade:4,   label:'4.0'},
  {min:75, grade:3.5, label:'3.5'},
  {min:70, grade:3,   label:'3.0'},
  {min:65, grade:2.5, label:'2.5'},
  {min:60, grade:2,   label:'2.0'},
  {min:55, grade:1.5, label:'1.5'},
  {min:50, grade:1,   label:'1.0'},
  {min:0,  grade:0,   label:'0'}
];
function gradeFor(total){ for(const g of GRADE_TABLE){ if(total>=g.min) return g; } return GRADE_TABLE[GRADE_TABLE.length-1]; }
function gradeTier(grade){ if(grade>=3.5) return 'good'; if(grade>=2.5) return 'mid'; if(grade>=1) return 'low'; return 'poor'; }

/* ---------- Auth / State ---------- */
const AUTH = { token:null, username:null, role:null, fullName:null, classId:'', subjectIds:[] };
const ROLE_LABEL = { admin:'ผู้ดูแลระบบ', homeroom:'ครูประจำชั้น', subject:'ครูผู้สอน' };

const STATE = {
  subjects:[], classes:[], students:[], enrollments:[], scores:[], users:[],
  ui:{
    tab:'dashboard',
    dash:{level:'subjects', subjectId:null, classId:null},
    admin:{sub:'subjects', studentFilter:'', enroll:{subjectId:'', classId:''}},
    record:{subjectId:'', classId:''},
    report:{subjectId:'', classId:''},
    ai:{subjectId:'', classId:''},
    importPreview:null
  }
};
let dashCharts = [];

/* ---------- Helpers ---------- */
function escapeHTML(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function initials(name){ if(!name) return '?'; return String(name).trim().charAt(0).toUpperCase(); }
function formatThaiDate(d){
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()+543}`;
}
function getSubjectById(id){ return STATE.subjects.find(s=>s.SubjectID===id); }
function getClassById(id){ return STATE.classes.find(c=>c.ClassID===id); }
function getStudentById(id){ return STATE.students.find(s=>s.StudentID===id); }
function classesForSubject(subjectId){
  if(!subjectId) return [];
  const ids = [...new Set(STATE.enrollments.filter(e=>e.SubjectID===subjectId).map(e=>e.ClassID))];
  return STATE.classes.filter(c=>ids.includes(c.ClassID));
}
function studentsForSubjectClass(subjectId, classId){
  const ids = STATE.enrollments.filter(e=>e.SubjectID===subjectId && e.ClassID===classId).map(e=>e.StudentID);
  return STATE.students.filter(s=>ids.includes(s.StudentID)).sort((a,b)=>String(a.FullName).localeCompare(String(b.FullName),'th'));
}
function scoresFor(subjectId, studentId){
  return STATE.scores.filter(s=>s.SubjectID===subjectId && s.StudentID===studentId).sort((a,b)=>Number(a.Round)-Number(b.Round));
}
function computeTotal(scores){ return scores.reduce((sum,s)=>sum+Number(s.ScoreValue||0),0); }

/* ---------- API ---------- */
function apiConfigured(){ return API_URL && API_URL.indexOf('PASTE_YOUR')===-1; }
async function fetchAllData(){
  const res = await fetch(`${API_URL}?action=getAllData&token=${encodeURIComponent(AUTH.token)}`, {method:'GET'});
  const json = await res.json();
  if(!json.success) throw new Error(json.error || 'โหลดข้อมูลไม่สำเร็จ');
  return json.data;
}
async function apiPost(action, params={}){
  const res = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(Object.assign({action, token:AUTH.token}, params))
  });
  const json = await res.json();
  if(!json.success){
    if(/เซสชันหมดอายุ|เข้าสู่ระบบ/.test(json.error||'')) { forceLogout(); }
    throw new Error(json.error || 'บันทึกไม่สำเร็จ');
  }
  return json.data;
}
async function reloadData(){
  try{
    const data = await fetchAllData();
    STATE.subjects = data.subjects || [];
    STATE.classes = data.classes || [];
    STATE.students = data.students || [];
    STATE.enrollments = data.enrollments || [];
    STATE.scores = data.scores || [];
    STATE.users = data.users || [];
  }catch(err){
    showToast(err.message, 'error');
  }
}

/* ---------- Auth flows ---------- */
function loadSession(){
  try{
    const raw = localStorage.getItem('kokpradu_session');
    if(!raw) return false;
    const s = JSON.parse(raw);
    Object.assign(AUTH, s);
    return !!AUTH.token;
  }catch(e){ return false; }
}
function saveSession(){ localStorage.setItem('kokpradu_session', JSON.stringify(AUTH)); }
function clearSession(){ localStorage.removeItem('kokpradu_session'); }

async function doLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errBox = document.getElementById('loginErrorBox');
  errBox.innerHTML = '';
  if(!username || !password){ errBox.innerHTML = `<div class="login-error">กรุณากรอกชื่อผู้ใช้และรหัสผ่าน</div>`; return; }
  if(!apiConfigured()){ errBox.innerHTML = `<div class="login-error">ยังไม่ได้ตั้งค่า API_URL ในไฟล์ index.html</div>`; return; }
  try{
    showLoading(true, 'กำลังเข้าสู่ระบบ...');
    const res = await fetch(API_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'login', username, password})
    });
    const json = await res.json();
    if(!json.success) throw new Error(json.error || 'เข้าสู่ระบบไม่สำเร็จ');
    Object.assign(AUTH, json.data);
    saveSession();
    await enterApp();
  }catch(err){
    errBox.innerHTML = `<div class="login-error">${escapeHTML(err.message)}</div>`;
  }finally{ showLoading(false); }
}
async function doLogout(){
  if(!confirm('ต้องการออกจากระบบหรือไม่?')) return;
  try{ await apiPost('logout',{}); }catch(e){}
  forceLogout();
}
function forceLogout(){
  clearSession();
  Object.assign(AUTH, {token:null, username:null, role:null, fullName:null, classId:'', subjectIds:[]});
  document.getElementById('appShell').style.display='none';
  document.body.classList.remove('no-scroll-pad');
  document.getElementById('loginScreen').style.display='block';
}
async function enterApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='block';
  document.body.classList.add('no-scroll-pad');
  document.body.style.paddingBottom = '';
  document.getElementById('roleBadge').textContent = `${AUTH.fullName||AUTH.username} · ${ROLE_LABEL[AUTH.role]||AUTH.role}`;
  bindNav();
  updateHeaderDate();
  buildBottomNav();
  showLoading(true,'กำลังโหลดข้อมูล...');
  await reloadData();
  showLoading(false);
  render();
}

/* ---------- UI: toast / loading / modal ---------- */
function showToast(msg, type){
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type||''}`;
  el.textContent = msg;
  c.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); }, 3200);
}
function showLoading(show, msg){
  const el = document.getElementById('loadingOverlay');
  document.getElementById('loadingText').textContent = msg || 'กำลังโหลดข้อมูล...';
  el.style.display = show ? 'flex' : 'none';
}
function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('open'); }

/* ---------- Shared render helpers ---------- */
function screenTitleHTML({icon, text, subtitle, onBack}){
  const left = onBack
    ? `<button class="title-back" onclick="${onBack}">${ICONS.back}</button>`
    : `<div class="title-icon">${ICONS[icon]||''}</div>`;
  return `<div class="screen-title__row">${left}<div><div class="screen-title__text">${escapeHTML(text)}</div>${subtitle?`<div class="screen-title__sub">${escapeHTML(subtitle)}</div>`:''}</div></div>`;
}
function emptyStateHTML(title, subtitle, ctaTab){
  return `<div class="empty-state">
    <div class="empty-state__icon">${ICONS.warn}</div>
    <div class="empty-state__title">${escapeHTML(title)}</div>
    ${subtitle?`<div class="empty-state__sub">${escapeHTML(subtitle)}</div>`:''}
    ${ctaTab?`<button class="btn btn-outline" style="margin-top:16px;" onclick="switchTab('${ctaTab}')">ไปที่หน้าจัดการข้อมูล</button>`:''}
  </div>`;
}
function emptyRowHTML(text){ return `<div class="empty-row">${escapeHTML(text)}</div>`; }

/* ---------- Nav / render dispatcher (role-aware) ---------- */
const ALL_TABS = [
  {key:'dashboard', label:'แดชบอร์ด', icon:'home', roles:['admin','homeroom','subject']},
  {key:'admin', label:'จัดการข้อมูล', icon:'admin', roles:['admin','homeroom']},
  {key:'record', label:'บันทึกคะแนน', icon:'edit', roles:['admin','homeroom','subject']},
  {key:'report', label:'รายงาน', icon:'chart', roles:['admin','homeroom','subject']},
  {key:'ai', label:'AI วิเคราะห์', icon:'ai', roles:['admin','homeroom','subject']},
  {key:'users', label:'ผู้ใช้งาน', icon:'key', roles:['admin']},
];
function tabsForRole(){ return ALL_TABS.filter(t=>t.roles.includes(AUTH.role)); }
function buildBottomNav(){
  const nav = document.getElementById('bottomNav');
  nav.innerHTML = tabsForRole().map(t=>`
    <button class="nav-btn" data-tab="${t.key}">
      <span class="nav-icon">${ICONS[t.icon]}</span>
      <span>${t.label}</span>
    </button>`).join('');
  bindNav();
}
function bindNav(){
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.onclick = ()=> switchTab(btn.dataset.tab);
  });
  const backdrop = document.getElementById('modalBackdrop');
  backdrop.onclick = e=>{ if(e.target.id==='modalBackdrop') closeModal(); };
}
function switchTab(tab){
  if(!tabsForRole().some(t=>t.key===tab)) tab='dashboard';
  STATE.ui.tab = tab; window.scrollTo(0,0); render();
}
function render(){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===STATE.ui.tab));
  const view = document.getElementById('view');
  const title = document.getElementById('screenTitle');
  destroyCharts();
  if(STATE.ui.tab==='dashboard') renderDashboard(view,title);
  else if(STATE.ui.tab==='admin') renderAdmin(view,title);
  else if(STATE.ui.tab==='record') renderRecord(view,title);
  else if(STATE.ui.tab==='report') renderReport(view,title);
  else if(STATE.ui.tab==='ai') renderAI(view,title);
  else if(STATE.ui.tab==='users') renderUsers(view,title);
}
function destroyCharts(){ dashCharts.forEach(c=>c.destroy()); dashCharts=[]; }

/* ============================================================
   DASHBOARD (+ 3D stat cards + Chart.js graphs)
   ============================================================ */
function renderDashboard(view, titleEl){
  const d = STATE.ui.dash;
  if(d.level==='subjects'){
    titleEl.innerHTML = screenTitleHTML({icon:'home', text:'แดชบอร์ด', subtitle:`ทั้งหมด ${STATE.subjects.length} รายวิชา`});

    const totalStudents = STATE.students.length;

    const allTotals = STATE.students.map(st=>{
      const subjIds = [...new Set(STATE.enrollments.filter(e=>e.StudentID===st.StudentID).map(e=>e.SubjectID))];
      return subjIds.reduce((sum,sid)=>sum+computeTotal(scoresFor(sid, st.StudentID)), 0) / (subjIds.length||1);

      <div class="stat-card stat-card--blue"><div class="stat-card__icon">${ICONS.warn}</div><div class="stat-card__value">${atRisk}</div><div class="stat-card__label">นักเรียนกลุ่มเสี่ยง (&lt;50)</div></div>
    </div>`;
    html += `<div class="chart-card"><div class="chart-card__title">คะแนนเฉลี่ยรายวิชา</div><canvas id="chartSubjectAvg" height="180"></canvas></div>`;
    html += `<div class="chart-card"><div class="chart-card__title">สัดส่วนระดับเกรดของนักเรียนทั้งหมด</div><canvas id="chartGradeDist" height="180"></canvas></div>`;
    html += `<div class="subject-grid">${STATE.subjects.map((s,i)=>{
      const cls = classesForSubject(s.SubjectID);
      const studentCount = new Set(STATE.enrollments.filter(e=>e.SubjectID===s.SubjectID).map(e=>e.StudentID)).size;
      const palette=['maroon','gold','green'];
      const color = palette[i%3];
      return `<button class="subject-card" onclick="openSubjectDash('${s.SubjectID}')">
        <div class="subject-card__accent accent-${color}">${ICONS.book}</div>
        <div class="subject-card__name">${escapeHTML(s.SubjectName)}</div>
        <div class="subject-card__meta">${cls.length} ชั้นเรียน · ${studentCount} คน</div>
      </button>`;
    }).join('')}</div>`;
    view.innerHTML = html;
    requestAnimationFrame(drawDashboardCharts);
  } else if(d.level==='classes'){
    const subject = getSubjectById(d.subjectId);
    titleEl.innerHTML = screenTitleHTML({text: subject?subject.SubjectName:'', subtitle:'เลือกชั้นเรียน', onBack:"backDash('subjects')"});
    const cls = classesForSubject(d.subjectId);
    if(cls.length===0){ view.innerHTML = emptyStateHTML('ยังไม่มีชั้นเรียนในวิชานี้','ไปกำหนดที่หน้าจัดการข้อมูล > จับคู่ลงทะเบียน','admin'); return; }
    view.innerHTML = `<div class="list-stack">${cls.map(c=>{
      const students = studentsForSubjectClass(d.subjectId, c.ClassID);
      return `<button class="list-row" onclick="openClassDash('${c.ClassID}')">
        <div class="list-row__icon">${ICONS.users}</div>
        <div class="list-row__body"><div class="list-row__title">${escapeHTML(c.ClassName)}</div><div class="list-row__meta">${students.length} คน</div></div>
        <div class="list-row__chev">${ICONS.chevRight}</div>
      </button>`;
    }).join('')}</div>`;
  } else {
    const subject = getSubjectById(d.subjectId), cls = getClassById(d.classId);
    titleEl.innerHTML = screenTitleHTML({text: cls?cls.ClassName:'', subtitle: subject?subject.SubjectName:'', onBack:"backDash('classes')"});
    const students = studentsForSubjectClass(d.subjectId, d.classId);
    if(students.length===0){ view.innerHTML = emptyStateHTML('ยังไม่มีนักเรียนในชั้นนี้','',null); return; }
    view.innerHTML = `<div class="chart-card"><div class="chart-card__title">คะแนนเฉลี่ยรายครั้งของห้องนี้</div><canvas id="chartClassTrend" height="180"></canvas></div>
    <div class="list-stack">${students.map(st=>{
      const sc = scoresFor(d.subjectId, st.StudentID);
      const total = computeTotal(sc);
      const g = gradeFor(total);
      return `<div class="student-row">
        <div class="avatar">${initials(st.FullName)}</div>
        <div class="student-row__body"><div class="student-row__name">${escapeHTML(st.FullName)}</div><div class="student-row__meta">บันทึกแล้ว ${sc.length} ครั้ง · รวม ${total} คะแนน</div></div>
        <div class="grade-badge tier-${gradeTier(g.grade)}">${g.label}</div>
      </div>`;
    }).join('')}</div>`;
    requestAnimationFrame(()=>drawClassTrendChart(d.subjectId, students));
  }
}
function drawDashboardCharts(){
  const subjLabels = STATE.subjects.map(s=>s.SubjectName);
  const subjAverages = STATE.subjects.map(s=>{
    const studentIds = [...new Set(STATE.enrollments.filter(e=>e.SubjectID===s.SubjectID).map(e=>e.StudentID))];
    if(!studentIds.length) return 0;
    const totals = studentIds.map(sid=>computeTotal(scoresFor(s.SubjectID, sid)));
    return totals.reduce((a,b)=>a+b,0)/totals.length;
  });
  const ctx1 = document.getElementById('chartSubjectAvg');
  if(ctx1){
    dashCharts.push(new Chart(ctx1, {
      type:'bar',
      data:{ labels:subjLabels, datasets:[{ label:'คะแนนเฉลี่ย', data:subjAverages, backgroundColor:'rgba(156,43,43,.75)', borderRadius:8 }]},
      options:{ plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, max:100 } } }
    }));
  }
  const gradeBuckets = {'4.0':0,'3.5':0,'3.0':0,'2.5':0,'2.0':0,'1.5':0,'1.0':0,'0':0};
  STATE.students.forEach(st=>{
    const subjIds = [...new Set(STATE.enrollments.filter(e=>e.StudentID===st.StudentID).map(e=>e.SubjectID))];
    subjIds.forEach(sid=>{
      const total = computeTotal(scoresFor(sid, st.StudentID));
      if(total>0) gradeBuckets[gradeFor(total).label]++;
    });
  });
  const ctx2 = document.getElementById('chartGradeDist');
  if(ctx2){
    dashCharts.push(new Chart(ctx2, {
      type:'doughnut',
      data:{ labels:Object.keys(gradeBuckets), datasets:[{ data:Object.values(gradeBuckets),
        backgroundColor:['#1F5C42','#2E6B4F','#E8A33D','#C98A2B','#C1622B','#B5382F','#9C2B2B','#5C1414'] }]},
      options:{ plugins:{legend:{position:'bottom', labels:{boxWidth:12, font:{size:10}}}} }
    }));
  }
}
function drawClassTrendChart(subjectId, students){
  const ctx = document.getElementById('chartClassTrend');
  if(!ctx) return;
  const maxRound = Math.max(1, ...students.map(st=>scoresFor(subjectId, st.StudentID).length));
  const avgPerRound = [];
  for(let r=1;r<=maxRound;r++){
    const vals = students.map(st=>{
      const sc = scoresFor(subjectId, st.StudentID).find(s=>Number(s.Round)===r);
      return sc ? Number(sc.ScoreValue) : null;
    }).filter(v=>v!==null);
    avgPerRound.push(vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null);
  }
  dashCharts.push(new Chart(ctx, {
    type:'line',
    data:{ labels: avgPerRound.map((_,i)=>'ครั้ง '+(i+1)), datasets:[{ label:'คะแนนเฉลี่ย', data:avgPerRound, borderColor:'#C98A2B', backgroundColor:'rgba(201,138,43,.25)', fill:true, tension:.35 }]},
    options:{ plugins:{legend:{display:false}} }
  }));
}

function setEnrollSel(key,val){ STATE.ui.admin.enroll[key]=val; render(); }
function toggleEnrollSelectAll(checked){
  document.querySelectorAll('.enrollChk').forEach(el=>{ el.checked = checked; });
  updateEnrollCount();
}
function updateEnrollCount(){
  const total = document.querySelectorAll('.enrollChk').length;
  const checked = document.querySelectorAll('.enrollChk:checked').length;
  const selectAll = document.getElementById('enrollSelectAll');
  if(selectAll) selectAll.checked = (total>0 && checked === total);
  const countLabel = document.getElementById('enrollCountLabel');
  if(countLabel) countLabel.textContent = checked;
  const btnLabel = document.getElementById('enrollSelectedCount');
  if(btnLabel) btnLabel.textContent = checked;
}
async function submitEnrollment(){
  const sel = STATE.ui.admin.enroll;
  const ids = Array.from(document.querySelectorAll('.enrollChk:checked')).map(el=>el.value);
  try{
    showLoading(true,'กำลังบันทึก...');
    await apiPost('setEnrollment', {subjectId:sel.subjectId, classId:sel.classId, studentIds:ids});
    await reloadData(); render();
    showToast('บันทึกการลงทะเบียนแล้ว','success');
  }catch(err){ showToast(err.message,'error'); } finally{ showLoading(false); }
}

  </div>
  <div class="dropzone" onclick="document.getElementById('importFileInput').click()">
    <strong>เลือกไฟล์ Excel (.xlsx / .xls / .csv)</strong>
    คอลัมน์แรกของไฟล์ต้องเป็นชื่อ-สกุลนักเรียน (แถวแรกอาจเป็นหัวตารางก็ได้)
  </div>

function handleImportFile(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
      let names = rows.map(r=>r[0]).filter(v=>v!==undefined && v!==null && String(v).trim()!=='').map(v=>String(v).trim());
      // ตัดแถวหัวตารางออกถ้าดูเหมือนคำว่า "ชื่อ" หรือ "name"
      if(names.length && /^(ชื่อ|ชื่อ-สกุล|name|ลำดับ)/i.test(names[0])) names = names.slice(1);
      STATE.ui.importPreview = names;
      document.getElementById('importPreviewBox').innerHTML = `<div class="import-preview">${names.map(n=>`<div>${escapeHTML(n)}</div>`).join('')}</div>
        <div class="field-hint">พบรายชื่อทั้งหมด ${names.length} คน</div>`;
      document.getElementById('importSubmitBtn').disabled = names.length===0;
    }catch(err){ showToast('อ่านไฟล์ไม่สำเร็จ: '+err.message, 'error'); }
  };
  reader.readAsArrayBuffer(file);
}
async function submitImport(){
  const classId = document.getElementById('importClassSelect').value;
  const names = STATE.ui.importPreview || [];
  if(!names.length){ showToast('ไม่มีรายชื่อให้นำเข้า','error'); return; }
  try{
    showLoading(true, 'กำลังนำเข้าข้อมูล...');
    const res = await apiPost('importStudents', {classId, names});
    await reloadData(); closeModal(); render();
    showToast(`นำเข้านักเรียนสำเร็จ ${res.imported} คน`, 'success');
  }catch(err){ showToast(err.message,'error'); } finally{ showLoading(false); }
}

async function exportReportPDF(){
  const rp = STATE.ui.report;
  const subject = getSubjectById(rp.subjectId), cls = getClassById(rp.classId);
  const el = document.getElementById('reportPrintArea');
  if(!el) return;
  showLoading(true, 'กำลังสร้างไฟล์ PDF...');
  try{
    const canvas = await html2canvas(el, {scale:2, backgroundColor:'#ffffff'});
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','pt','a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    let heightLeft = imgHeight;
    let position = 0;
    pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
    heightLeft -= pageHeight;
    while(heightLeft > 0){
      position -= pageHeight;
      pdf.addPage();
      pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
      heightLeft -= pageHeight;
    }
    pdf.save(`รายงานคะแนน_${subject?subject.SubjectName:''}_${cls?cls.ClassName:''}.pdf`);
  }catch(err){
    showToast('สร้าง PDF ไม่สำเร็จ: '+err.message, 'error');
  }finally{
    showLoading(false);
  }
}

function setAISel(key,val){ STATE.ui.ai[key]=val; if(key==='subjectId') STATE.ui.ai.classId=''; render(); }

function computeAIStats(subjectId, classId){
  const students = studentsForSubjectClass(subjectId, classId);
  const rows = students.map(st=>{
    const sc = scoresFor(subjectId, st.StudentID);
    const total = computeTotal(sc);
    return {student:st, scores:sc, total, grade:gradeFor(total)};
  });
  const withScores = rows.filter(r=>r.scores.length>0);
  const totals = withScores.map(r=>r.total);
  const avg = totals.length ? totals.reduce((a,b)=>a+b,0)/totals.length : 0;
  const max = totals.length ? Math.max(...totals) : 0;
  const min = totals.length ? Math.min(...totals) : 0;
  const variance = totals.length ? totals.reduce((s,t)=>s+Math.pow(t-avg,2),0)/totals.length : 0;
  const sd = Math.sqrt(variance);
  const atRisk = withScores.filter(r=>r.total < 50).sort((a,b)=>a.total-b.total);
  const excellent = withScores.filter(r=>r.total >= 80).sort((a,b)=>b.total-a.total);
  // แนวโน้มค่าเฉลี่ยรายครั้ง
  const maxRound = Math.max(0, ...withScores.map(r=>r.scores.length));
  const roundAvgs = [];
  for(let i=0;i<maxRound;i++){
    const vals = withScores.map(r=>r.scores[i]).filter(Boolean).map(s=>Number(s.ScoreValue));
    if(vals.length) roundAvgs.push(vals.reduce((a,b)=>a+b,0)/vals.length);
  }
  let trend = 'คงที่';
  if(roundAvgs.length>=2){
    const diff = roundAvgs[roundAvgs.length-1]-roundAvgs[0];
    trend = diff>1.5 ? 'ดีขึ้นต่อเนื่อง' : diff<-1.5 ? 'มีแนวโน้มลดลง' : 'ค่อนข้างคงที่';
  }
  return {rows, withScores, avg, max, min, sd, atRisk, excellent, roundAvgs, trend, noScore: rows.length - withScores.length};
}
function buildRuleBasedNarrative(stats, subjectName, className){
  const p = [];
  p.push(`ภาพรวมวิชา${subjectName} ชั้น${className}: มีนักเรียนที่มีคะแนนบันทึกแล้ว ${stats.withScores.length} จากทั้งหมด ${stats.rows.length} คน คะแนนเฉลี่ยรวมอยู่ที่ ${stats.avg.toFixed(1)} คะแนน (สูงสุด ${stats.max} ต่ำสุด ${stats.min} ส่วนเบี่ยงเบนมาตรฐาน ${stats.sd.toFixed(1)})`);
  if(stats.roundAvgs.length>=2){
    p.push(`แนวโน้มคะแนนเฉลี่ยระหว่างรอบการประเมิน ${stats.trend} โดยค่าเฉลี่ยครั้งแรกอยู่ที่ ${stats.roundAvgs[0].toFixed(1)} และครั้งล่าสุดอยู่ที่ ${stats.roundAvgs[stats.roundAvgs.length-1].toFixed(1)}`);
  }
  if(stats.atRisk.length){
    p.push(`พบนักเรียนกลุ่มเสี่ยง (คะแนนรวมต่ำกว่า 50) จำนวน ${stats.atRisk.length} คน ควรจัดสอนเสริมหรือให้คำปรึกษาเพิ่มเติมเป็นรายบุคคล`);
  } else if(stats.withScores.length){
    p.push('ไม่พบนักเรียนกลุ่มเสี่ยงในขณะนี้ ถือว่าภาพรวมของห้องอยู่ในเกณฑ์ที่น่าพอใจ');
  }
  if(stats.excellent.length){
    p.push(`มีนักเรียนที่ทำคะแนนได้ดีเยี่ยม (80 คะแนนขึ้นไป) จำนวน ${stats.excellent.length} คน ควรส่งเสริมศักยภาพเพิ่มเติม เช่น กิจกรรมเสริมหรือโจทย์ท้าทาย`);
  }
  if(stats.noScore>0){
    p.push(`ยังมีนักเรียน ${stats.noScore} คนที่ยังไม่มีการบันทึกคะแนนเลย ควรตรวจสอบและบันทึกให้ครบถ้วน`);
  }
  if(stats.sd > 15){
    p.push('คะแนนของนักเรียนในห้องนี้มีการกระจายตัวค่อนข้างสูง (ความแตกต่างระหว่างเด็กเก่งและเด็กที่ต้องพัฒนาชัดเจน) ควรพิจารณาการสอนแบบแบ่งกลุ่มตามระดับความสามารถ');
  }
  return p.join('\n\n');
}
async function runAIAnalysis(){
  const a = STATE.ui.ai;
  const subject = getSubjectById(a.subjectId), cls = getClassById(a.classId);
  const stats = computeAIStats(a.subjectId, a.classId);
  const box = document.getElementById('aiResultBox');
  if(stats.rows.length===0){ box.innerHTML = `<div class="ai-result">${emptyRowHTML('ยังไม่มีนักเรียนลงทะเบียนวิชานี้ในชั้นนี้')}</div>`; return; }

  showLoading(true, 'กำลังวิเคราะห์ข้อมูล...');
  let narrative = buildRuleBasedNarrative(stats, subject.SubjectName, cls.ClassName);
  let usedAI = false;
  try{
    const prompt = `คุณเป็นผู้ช่วยด้านการศึกษา วิเคราะห์ผลการเรียนวิชา "${subject.SubjectName}" ชั้น "${cls.ClassName}" จากข้อมูลสถิติต่อไปนี้ แล้วเขียนสรุปเป็นภาษาไทย กระชับ อ่านง่าย 3-5 ย่อหน้า พร้อมคำแนะนำเชิงการสอนที่นำไปใช้ได้จริงสำหรับครู:
- จำนวนนักเรียนที่มีคะแนน: ${stats.withScores.length} จาก ${stats.rows.length} คน
- คะแนนเฉลี่ย: ${stats.avg.toFixed(1)}, สูงสุด: ${stats.max}, ต่ำสุด: ${stats.min}, SD: ${stats.sd.toFixed(1)}
- แนวโน้มคะแนนรายรอบ: ${stats.roundAvgs.map(v=>v.toFixed(1)).join(', ')}
- จำนวนนักเรียนกลุ่มเสี่ยง (ต่ำกว่า 50): ${stats.atRisk.length}
- จำนวนนักเรียนคะแนนดีเยี่ยม (80 ขึ้นไป): ${stats.excellent.length}`;
    const res = await apiPost('aiAnalyze', {prompt});
    if(res && res.available && res.text){ narrative = res.text; usedAI = true; }
  }catch(err){ /* ใช้ rule-based แทนอย่างเงียบๆ ถ้า AI เรียกไม่สำเร็จ */ }
  finally{ showLoading(false); }

  box.innerHTML = `<div class="ai-result">
    <span class="ai-badge">${usedAI? 'วิเคราะห์โดย AI (Gemini)' : 'วิเคราะห์เชิงสถิติอัตโนมัติ'}</span>
    <h4>สรุปผลการวิเคราะห์</h4>
    <p>${escapeHTML(narrative)}</p>
  </div>
  ${stats.atRisk.length ? `<div class="ai-result">
    <h4>นักเรียนกลุ่มเสี่ยง (คะแนนรวม &lt; 50)</h4>
    ${stats.atRisk.map(r=>`<div class="risk-row"><span>${escapeHTML(r.student.FullName)}</span><span class="grade-pill tier-poor">${r.total} คะแนน</span></div>`).join('')}
  </div>` : ''}
  ${stats.excellent.length ? `<div class="ai-result">
    <h4>นักเรียนคะแนนดีเยี่ยม (80 ขึ้นไป)</h4>
    ${stats.excellent.map(r=>`<div class="risk-row"><span>${escapeHTML(r.student.FullName)}</span><span class="grade-pill tier-good">${r.total} คะแนน</span></div>`).join('')}
  </div>` : ''}`;
}

/* ============================================================
   USERS (admin only) — จัดการบัญชี Admin / ครูประจำชั้น / ครูผู้สอน
   ============================================================ */
function renderUsers(view, titleEl){
  titleEl.innerHTML = screenTitleHTML({icon:'key', text:'จัดการผู้ใช้งาน', subtitle:'Admin · ครูประจำชั้น · ครูผู้สอน'});
  let html = `<button class="btn btn-primary btn-block" onclick="openAddUserModal()">${ICONS.plus}เพิ่มผู้ใช้งาน</button>
  <div class="list-stack" style="margin-top:14px;">`;
  html += STATE.users.length ? STATE.users.map(u=>{
    let meta = ROLE_LABEL[u.Role] || u.Role;
    if(u.Role==='homeroom'){ const c=getClassById(u.ClassID); meta += c? ' · '+c.ClassName : ''; }
    if(u.Role==='subject'){ const names=(u.SubjectIDs||'').split(',').filter(Boolean).map(id=>{const s=getSubjectById(id);return s?s.SubjectName:'';}).filter(Boolean); if(names.length) meta += ' · '+names.join(', '); }
    return `<div class="list-row">
      <div class="avatar sm">${initials(u.FullName||u.Username)}</div>
      <div class="list-row__body"><div class="list-row__title">${escapeHTML(u.FullName||u.Username)} (${escapeHTML(u.Username)})</div><div class="list-row__meta">${escapeHTML(meta)}</div></div>
      ${u.Username!==AUTH.username ? `<button class="icon-btn danger" onclick="deleteUserAction('${u.Username}')">${ICONS.trash}</button>` : ''}
    </div>`;
  }).join('') : emptyRowHTML('ยังไม่มีผู้ใช้งานอื่น');
  html += `</div>`;
  view.innerHTML = html;
}
function openAddUserModal(){
  openModal(`<div class="modal-header"><div class="modal-title">เพิ่มผู้ใช้งาน</div><button class="icon-btn" onclick="closeModal()">${ICONS.close}</button></div>
  <div class="field" style="margin-top:16px;"><label>ชื่อ-สกุล</label><input type="text" id="uFullName" placeholder="ชื่อผู้ใช้งาน"></div>
  <div class="field"><label>ชื่อผู้ใช้ (username)</label><input type="text" id="uUsername" placeholder="เช่น teacher01"></div>
  <div class="field"><label>รหัสผ่าน</label><input type="password" id="uPassword" placeholder="อย่างน้อย 6 ตัวอักษร"></div>
  <div class="field"><label>บทบาท</label><select id="uRole" onchange="toggleUserRoleFields()">
    <option value="admin">ผู้ดูแลระบบ</option>
    <option value="homeroom">ครูประจำชั้น</option>
    <option value="subject">ครูผู้สอน</option>
  </select></div>
  <div class="field" id="uClassField" style="display:none;"><label>ประจำชั้น</label><select id="uClassId">${STATE.classes.map(c=>`<option value="${c.ClassID}">${escapeHTML(c.ClassName)}</option>`).join('')}</select></div>
  <div class="field" id="uSubjectField" style="display:none;"><label>วิชาที่สอน (เลือกได้หลายวิชา)</label>
    <div class="list-stack">${STATE.subjects.map(s=>`<label class="checkbox-row"><input type="checkbox" class="uSubjChk" value="${s.SubjectID}"><span>${escapeHTML(s.SubjectName)}</span></label>`).join('')}</div>
  </div>
  <button class="btn btn-primary btn-block" style="margin-top:8px;" onclick="submitAddUser()">${ICONS.check}บันทึก</button>`);
  toggleUserRoleFields();
}
function toggleUserRoleFields(){
  const role = document.getElementById('uRole').value;
  document.getElementById('uClassField').style.display = role==='homeroom' ? 'block' : 'none';
  document.getElementById('uSubjectField').style.display = role==='subject' ? 'block' : 'none';
}
async function submitAddUser(){
  const fullName = document.getElementById('uFullName').value.trim();
  const username = document.getElementById('uUsername').value.trim();
  const password = document.getElementById('uPassword').value;
  const role = document.getElementById('uRole').value;
  const classId = role==='homeroom' ? document.getElementById('uClassId').value : '';
  const subjectIds = role==='subject' ? Array.from(document.querySelectorAll('.uSubjChk:checked')).map(el=>el.value) : [];
  if(!username || !password){ showToast('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน','error'); return; }
  if(password.length<6){ showToast('รหัสผ่านควรมีอย่างน้อย 6 ตัวอักษร','error'); return; }
  try{
    showLoading(true,'กำลังบันทึก...');
    await apiPost('addUser', {username,password,role,fullName,classId,subjectIds});
    await reloadData(); closeModal(); render();
    showToast('เพิ่มผู้ใช้งานแล้ว','success');
  }catch(err){ showToast(err.message,'error'); } finally{ showLoading(false); }
}
async function deleteUserAction(username){
  if(!confirm(`ลบผู้ใช้งาน "${username}" หรือไม่?`)) return;
  try{ showLoading(true,'กำลังลบ...'); await apiPost('deleteUser',{username}); await reloadData(); render(); showToast('ลบผู้ใช้งานแล้ว','success'); }
  catch(err){ showToast(err.message,'error'); } finally{ showLoading(false); }
}

function updateHeaderDate(){
  const days=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const d = new Date();
  document.getElementById('headerDate').textContent = `วัน${days[d.getDay()]}ที่ ${formatThaiDate(d)}`;
}
async function init(){
  if(!apiConfigured()){
    document.getElementById('loginScreen').style.display='block';
    document.getElementById('loginErrorBox').innerHTML = `<div class="config-warning" style="margin-top:14px;">
      <div class="config-warning__title">ยังไม่ได้เชื่อมต่อฐานข้อมูล</div>
      <div class="config-warning__body">เปิดไฟล์ index.html แล้วแก้ค่า API_URL ให้เป็นลิงก์ Web App ของ Google Apps Script ของคุณ (ดูวิธีทำในไฟล์ README.md)</div>
    </div>`;
    return;
  }
  if(loadSession()){
    try{ await enterApp(); return; }
    catch(e){ forceLogout(); }
  }
  document.getElementById('loginScreen').style.display='block';
}
document.addEventListener('DOMContentLoaded', init);
